---
mariadb:
  enabled: true
  primary:
    service:
      type: LoadBalancer

api:
  image:
    pullPolicy: Never
    tag: latest
  volumes:
    - name: src
      hostPath:
        path: /app/api/src
  volumeMounts:
    - name: src
      mountPath: /app/src
  autoscaling:
    enabled: true
    minReplicas: 2
  service:
    type: LoadBalancer
    port: 3001
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  aws:
    region: ap-northeast-2
    sqs:
      queueUrlAllocation: https://sqs.ap-northeast-2.amazonaws.com/889753608001/kkalla-dev-sqs-rebalance
      queueUrlMarketRisk: https://sqs.ap-northeast-2.amazonaws.com/889753608001/kkalla-dev-sqs-volatility

ui:
  image:
    pullPolicy: Never
    tag: latest
  volumes:
    - name: src
      hostPath:
        path: /app/ui/src
    - name: public
      hostPath:
        path: /app/ui/public
    - name: tailwind-config
      hostPath:
        path: /app/ui/tailwind.config.ts
    - name: postcss-config
      hostPath:
        path: /app/ui/postcss.config.mjs
    - name: next-config
      hostPath:
        path: /app/ui/next.config.mjs
  volumeMounts:
    - name: src
      mountPath: /app/src
    - name: public
      mountPath: /app/public
    - name: tailwind-config
      mountPath: /app/tailwind.config.ts
      readOnly: true
    - name: postcss-config
      mountPath: /app/postcss.config.mjs
      readOnly: true
    - name: next-config
      mountPath: /app/next.config.mjs
      readOnly: true
  autoscaling:
    enabled: false
  service:
    type: LoadBalancer
  resources:
    requests:
      cpu: 1000m
      memory: 1Gi
  publicUrl: http://localhost:3000/
  api:
    url: "http://{{ .Release.Name }}-api.{{ .Release.Namespace }}.svc.cluster.local:3001/"
